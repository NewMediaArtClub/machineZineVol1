<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machinezine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #111;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  #viewer {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    min-height: 100vh;
    padding: 2rem 1rem 5rem;
  }

  #top-bar {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 900px;
    margin-bottom: 2rem;
  }

  #doc-title {
    flex: 1;
    font-size: 0.9rem;
    color: #555;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
  }

  #stage {
    perspective: 2000px;
    width: 100%;
    max-width: 780px;
    position: relative;
  }

  .page-wrapper {
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 0.5px rgba(255,255,255,0.06);
  }

  #canvas-current, #canvas-next {
    display: block;
    max-width: 100%;
    height: auto;
  }

  #flip-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
    display: none;
    border-radius: 4px;
    overflow: hidden;
  }

  #canvas-flip {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 4px;
    transform-origin: left center;
    backface-visibility: hidden;
  }

  @keyframes flip-forward {
    0%   { transform: rotateY(0deg); opacity: 1; }
    40%  { transform: rotateY(-60deg); opacity: 0.9; box-shadow: -20px 0 40px rgba(0,0,0,0.4); }
    100% { transform: rotateY(-180deg); opacity: 0; }
  }

  @keyframes flip-backward {
    0%   { transform: rotateY(-180deg); opacity: 0; }
    40%  { transform: rotateY(-120deg); opacity: 0.9; box-shadow: -20px 0 40px rgba(0,0,0,0.4); }
    100% { transform: rotateY(0deg); opacity: 1; }
  }

  #canvas-flip.flipping-forward {
    animation: flip-forward 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  #canvas-flip.flipping-backward {
    transform-origin: right center;
    animation: flip-backward 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  #page-track {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 2rem;
    justify-content: center;
  }

  #page-info {
    font-size: 0.85rem;
    color: #555;
    min-width: 80px;
    text-align: center;
    margin-top: 0.75rem;
  }

  .nav-btn {
    background: #1c1c1c;
    border: 1px solid #2e2e2e;
    color: #ccc;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
    flex-shrink: 0;
  }

  .nav-btn:hover:not(:disabled) { background: #2a2a2a; border-color: #555; }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }

  #progress-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    max-width: 240px;
    overflow: hidden;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #333;
    transition: background 0.2s, transform 0.2s;
    flex-shrink: 0;
    cursor: pointer;
  }

  .dot.active { background: #fff; transform: scale(1.4); }
  .dot.near   { background: #666; }

  #loading {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #555;
    font-size: 0.85rem;
    gap: 10px;
    align-items: center;
    flex-direction: column;
  }

  #loading.active { display: flex; }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid #2a2a2a;
    border-top-color: #777;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #key-hint {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: #333;
    display: flex;
    gap: 1rem;
  }

  #key-hint kbd {
    background: #1c1c1c;
    border: 1px solid #2e2e2e;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.72rem;
    font-family: inherit;
    color: #555;
  }

  #error-msg {
    display: none;
    color: #c0392b;
    font-size: 0.9rem;
    margin-top: 2rem;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="viewer">
  <div id="top-bar">
    <span id="doc-title">Machinezine</span>
  </div>

  <div id="stage">
    <div class="page-wrapper" id="page-wrapper">
      <canvas id="canvas-current"></canvas>
      <canvas id="canvas-next" style="display:none; position:absolute; top:0; left:0;"></canvas>
      <div id="flip-overlay">
        <canvas id="canvas-flip"></canvas>
      </div>
      <div id="loading"><div class="spinner"></div><span>Loading...</span></div>
    </div>
  </div>

  <div id="page-track">
    <button class="nav-btn" id="prev-btn" onclick="changePage(-1)" disabled>&#8592;</button>
    <div id="progress-dots"></div>
    <button class="nav-btn" id="next-btn" onclick="changePage(1)" disabled>&#8594;</button>
  </div>

  <div id="page-info"></div>

  <div id="key-hint">
    <span><kbd>&#8592;</kbd> previous</span>
    <span><kbd>&#8594;</kbd> next</span>
  </div>

  <div id="error-msg"></div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const PDF_PATH = 'https://newmediaartclub.github.io/machineZineVol1/machinezine.pdf';

  let pdfDoc = null;
  let currentPage = 1;
  let totalPages = 0;
  let isAnimating = false;

  const canvasCurrent = document.getElementById('canvas-current');
  const canvasNext    = document.getElementById('canvas-next');
  const canvasFlip    = document.getElementById('canvas-flip');
  const flipOverlay   = document.getElementById('flip-overlay');
  const prevBtn       = document.getElementById('prev-btn');
  const nextBtn       = document.getElementById('next-btn');
  const pageInfo      = document.getElementById('page-info');
  const progressDots  = document.getElementById('progress-dots');
  const loadingEl     = document.getElementById('loading');
  const errorMsg      = document.getElementById('error-msg');

  async function init() {
    loadingEl.classList.add('active');
    try {
      pdfDoc = await pdfjsLib.getDocument(PDF_PATH).promise;
      totalPages = pdfDoc.numPages;
      currentPage = 1;
      loadingEl.classList.remove('active');
      buildDots();
      await renderPage(currentPage, canvasCurrent);
      updateUI();
    } catch (err) {
      loadingEl.classList.remove('active');
      errorMsg.style.display = 'block';
      errorMsg.innerHTML =
        'Could not load <strong>machinezine.pdf</strong>.<br>' +
        'Make sure it sits in the same folder as this HTML file.';
    }
  }

  async function renderPage(pageNum, targetCanvas) {
    const page = await pdfDoc.getPage(pageNum);
    const scale = getScale(page);
    const viewport = page.getViewport({ scale });
    targetCanvas.width  = viewport.width;
    targetCanvas.height = viewport.height;
    const ctx = targetCanvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
  }

  function getScale(page) {
    const maxW = Math.min(780, window.innerWidth - 40) * window.devicePixelRatio;
    const vp = page.getViewport({ scale: 1 });
    return Math.min(maxW / vp.width, 2.5);
  }

  async function changePage(direction) {
    if (isAnimating) return;
    const target = currentPage + direction;
    if (target < 1 || target > totalPages) return;

    isAnimating = true;
    prevBtn.disabled = true;
    nextBtn.disabled = true;

    canvasNext.style.display = 'none';
    await renderPage(target, canvasNext);

    const w = canvasCurrent.width;
    const h = canvasCurrent.height;
    canvasFlip.width  = w;
    canvasFlip.height = h;
    canvasFlip.getContext('2d').drawImage(canvasCurrent, 0, 0);

    flipOverlay.style.display = 'block';

    const ctxCurrent = canvasCurrent.getContext('2d');
    ctxCurrent.clearRect(0, 0, w, h);
    ctxCurrent.drawImage(canvasNext, 0, 0);

    canvasFlip.classList.remove('flipping-forward', 'flipping-backward');
    void canvasFlip.offsetWidth;
    canvasFlip.classList.add(direction > 0 ? 'flipping-forward' : 'flipping-backward');

    currentPage = target;
    updateUI();

    setTimeout(() => {
      flipOverlay.style.display = 'none';
      canvasFlip.classList.remove('flipping-forward', 'flipping-backward');
      isAnimating = false;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
    }, 520);
  }

  async function jumpToPage(target) {
    if (isAnimating) return;
    isAnimating = true;
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    loadingEl.classList.add('active');
    await renderPage(target, canvasCurrent);
    loadingEl.classList.remove('active');
    currentPage = target;
    isAnimating = false;
    updateUI();
  }

  function updateUI() {
    pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
    prevBtn.disabled = currentPage <= 1 || isAnimating;
    nextBtn.disabled = currentPage >= totalPages || isAnimating;
    updateDots();
  }

  function buildDots() {
    progressDots.innerHTML = '';
    const max = Math.min(totalPages, 30);
    for (let i = 1; i <= max; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.title = `Page ${i}`;
      d.addEventListener('click', () => {
        if (isAnimating || i === currentPage) return;
        Math.abs(i - currentPage) === 1 ? changePage(i > currentPage ? 1 : -1) : jumpToPage(i);
      });
      progressDots.appendChild(d);
    }
    if (totalPages > 30) {
      const el = document.createElement('div');
      el.style.cssText = 'font-size:0.7rem; color:#333; padding:0 2px;';
      el.textContent = '...';
      progressDots.appendChild(el);
    }
  }

  function updateDots() {
    progressDots.querySelectorAll('.dot').forEach((d, i) => {
      const p = i + 1;
      d.classList.toggle('active', p === currentPage);
      d.classList.toggle('near', Math.abs(p - currentPage) <= 2 && p !== currentPage);
    });
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changePage(-1);
  });

  init();
</script>
</body>
</html>
