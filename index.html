<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Machinezine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #111;
    color: #eee;
    overflow: hidden;
    overscroll-behavior: none;
  }

  #viewer {
    height: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #top-bar {
    flex-shrink: 0;
    width: 100%;
    padding: 0.6rem 1.5rem;
    padding-top: max(0.6rem, env(safe-area-inset-top));
    display: flex;
    align-items: center;
  }

  #doc-title {
    font-size: 0.7rem;
    color: #3a3a3a;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }

  #stage {
    flex: 1;
    width: 100%;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 1rem;
    position: relative;
    touch-action: pan-y;
  }

  /* The spread container holds 1 or 2 pages side by side */
  #spread {
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
    position: relative;
  }

  .page-panel {
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* Left panel gets a slight right shadow to suggest a spine */
  #panel-left {
    box-shadow:
      inset -8px 0 16px rgba(0,0,0,0.25),
      -2px 0 32px rgba(0,0,0,0.6),
      0 16px 48px rgba(0,0,0,0.8);
  }

  /* Right panel */
  #panel-right {
    box-shadow:
      inset 8px 0 16px rgba(0,0,0,0.15),
      2px 0 32px rgba(0,0,0,0.6),
      0 16px 48px rgba(0,0,0,0.8);
  }

  /* Single cover page */
  #spread.single #panel-left {
    box-shadow: 0 16px 48px rgba(0,0,0,0.8), 0 0 0 0.5px rgba(255,255,255,0.05);
  }

  canvas { display: block; pointer-events: none; }

  /* Click / tap zones over the visible spread, left half = prev, right half = next */
  #nav-zones {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    z-index: 5;
  }
  .nav-zone {
    flex: 1;
    height: 100%;
  }
  .nav-zone.left  { cursor: w-resize; }
  .nav-zone.right { cursor: e-resize; }
  .nav-zone.disabled { cursor: default; }

  /* Flip overlay sits over the whole spread */
  #flip-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
    display: none;
    overflow: hidden;
  }

  #canvas-flip {
    display: block;
    width: 100%;
    height: 100%;
    transform-origin: left center;
    backface-visibility: hidden;
  }

  @keyframes flip-forward {
    0%   { transform: rotateY(0deg); opacity: 1; }
    40%  { transform: rotateY(-55deg); opacity: 0.85; }
    100% { transform: rotateY(-180deg); opacity: 0; }
  }
  @keyframes flip-backward {
    0%   { transform: rotateY(-180deg); opacity: 0; }
    40%  { transform: rotateY(-125deg); opacity: 0.85; }
    100% { transform: rotateY(0deg); opacity: 1; }
  }
  #canvas-flip.flipping-forward {
    animation: flip-forward 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  #canvas-flip.flipping-backward {
    transform-origin: right center;
    animation: flip-backward 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  /* Live drag-follow tracking (touch/mouse swipe in progress) */
  #canvas-flip.dragging {
    animation: none;
    transition: none;
  }

  #controls {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    padding: 0.6rem 1rem 0.8rem;
    padding-bottom: max(0.8rem, env(safe-area-inset-bottom));
  }

  #page-track {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .nav-btn {
    background: #1c1c1c;
    border: 1px solid #2e2e2e;
    color: #bbb;
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
    touch-action: manipulation;
  }
  .nav-btn:hover:not(:disabled) { background: #2a2a2a; border-color: #555; }
  .nav-btn:active:not(:disabled) { background: #333; }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }

  #progress-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    max-width: 280px;
    overflow: hidden;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #2e2e2e;
    transition: background 0.2s, transform 0.2s;
    flex-shrink: 0;
    cursor: pointer;
  }
  .dot.active { background: #fff; transform: scale(1.4); }
  .dot.near   { background: #666; }

  #page-info {
    font-size: 0.72rem;
    color: #3a3a3a;
  }

  #key-hint {
    font-size: 0.68rem;
    color: #272727;
    display: flex;
    gap: 1rem;
  }
  #key-hint kbd {
    background: #1a1a1a;
    border: 1px solid #262626;
    border-radius: 3px;
    padding: 1px 5px;
    font-family: inherit;
    color: #3a3a3a;
  }

  #swipe-hint {
    font-size: 0.68rem;
    color: #272727;
    display: none;
  }

  #loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #555;
    font-size: 0.85rem;
    gap: 10px;
    align-items: center;
    flex-direction: column;
    display: none;
  }
  #loading.active { display: flex; }

  .spinner {
    width: 26px; height: 26px;
    border: 2px solid #2a2a2a;
    border-top-color: #777;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #error-msg {
    display: none;
    color: #c0392b;
    font-size: 0.9rem;
    text-align: center;
    line-height: 1.6;
    padding: 2rem;
  }

  /* Touch / small-screen tuning: bigger tap targets, hide the keyboard hint,
     show the swipe hint instead */
  @media (pointer: coarse) {
    #key-hint { display: none; }
    #swipe-hint { display: block; }
    .nav-btn { width: 42px; height: 42px; font-size: 1.15rem; }
    #page-track { gap: 1rem; }
  }

  @media (max-width: 480px) {
    #top-bar { padding: 0.5rem 1rem; }
    #doc-title { font-size: 0.62rem; }
    #stage { padding: 0 0.4rem; }
    #controls { padding: 0.5rem 0.75rem 0.7rem; padding-bottom: max(0.7rem, env(safe-area-inset-bottom)); gap: 0.3rem; }
    #progress-dots { max-width: 180px; }
    #page-info { font-size: 0.66rem; }
  }
</style>
</head>
<body>
<div id="viewer">
  <div id="top-bar">
    <span id="doc-title">Machinezine</span>
  </div>

  <div id="stage">
    <div id="spread" class="single">
      <div class="page-panel" id="panel-left">
        <canvas id="canvas-left"></canvas>
      </div>
      <div class="page-panel" id="panel-right" style="display:none;">
        <canvas id="canvas-right"></canvas>
      </div>
      <div id="nav-zones">
        <div class="nav-zone left"></div>
        <div class="nav-zone right"></div>
      </div>
      <div id="flip-overlay">
        <canvas id="canvas-flip"></canvas>
      </div>
    </div>
    <div id="loading"><div class="spinner"></div><span>Loading...</span></div>
    <div id="error-msg"></div>
  </div>

  <div id="controls">
    <div id="page-track">
      <button class="nav-btn" id="prev-btn" onclick="turn(-1)" disabled>&#8592;</button>
      <div id="progress-dots"></div>
      <button class="nav-btn" id="next-btn" onclick="turn(1)" disabled>&#8594;</button>
    </div>
    <div id="page-info"></div>
    <div id="key-hint">
      <span><kbd>&#8592;</kbd> previous</span>
      <span><kbd>&#8594;</kbd> next</span>
    </div>
    <div id="swipe-hint">Swipe to turn the page</div>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const PDF_PATH = 'https://raw.githubusercontent.com/NewMediaArtClub/machineZineVol1/main/machinezine.pdf';

  let pdfDoc      = null;
  let totalPages  = 0;
  let isAnimating = false;
  let nativeW     = 1;
  let nativeH     = 1;

  // "spread index": 0 = cover (page 1 alone), 1 = pages 2-3, 2 = pages 4-5 ...
  let spreadIdx = 0;

  const stage       = document.getElementById('stage');
  const spreadEl    = document.getElementById('spread');
  const panelLeft   = document.getElementById('panel-left');
  const panelRight  = document.getElementById('panel-right');
  const canvasLeft  = document.getElementById('canvas-left');
  const canvasRight = document.getElementById('canvas-right');
  const canvasFlip  = document.getElementById('canvas-flip');
  const flipOverlay = document.getElementById('flip-overlay');
  const prevBtn     = document.getElementById('prev-btn');
  const nextBtn     = document.getElementById('next-btn');
  const pageInfo    = document.getElementById('page-info');
  const progressDots= document.getElementById('progress-dots');
  const loadingEl   = document.getElementById('loading');
  const errorMsg    = document.getElementById('error-msg');
  const navZoneLeft = document.querySelector('.nav-zone.left');
  const navZoneRight= document.querySelector('.nav-zone.right');

  // How many spreads total?
  // Spread 0 = page 1, spread 1 = pages 2-3, spread 2 = pages 4-5, ...
  function totalSpreads() {
    // remaining pages after cover, in pairs
    return 1 + Math.ceil((totalPages - 1) / 2);
  }

  // Which PDF page numbers does spread i contain?
  function spreadPages(i) {
    if (i === 0) return [1]; // cover
    const left  = 2 + (i - 1) * 2;
    const right = left + 1;
    return right <= totalPages ? [left, right] : [left];
  }

  // Is this spread a double?
  function isDouble(i) {
    return spreadPages(i).length === 2;
  }

  // Compute display dimensions for a single page to fit the stage
  function getPageDisplaySize(isSpreadView) {
    const availW = stage.clientWidth  - 32;
    const availH = stage.clientHeight - 8;
    // For a spread, each page takes half the width
    const maxPageW = isSpreadView ? availW / 2 : availW;
    const byWidth  = { w: maxPageW, h: maxPageW * (nativeH / nativeW) };
    const byHeight = { w: availH * (nativeW / nativeH), h: availH };
    // Pick whichever fits
    if (byWidth.h <= availH && byWidth.w <= maxPageW) return byWidth;
    return { w: Math.min(byHeight.w, maxPageW), h: Math.min(byHeight.h, availH) };
  }

  async function renderSinglePage(pageNum, targetCanvas) {
    const page = await pdfDoc.getPage(pageNum);
    const double = isDouble(spreadIdx);
    const { w, h } = getPageDisplaySize(double);
    const dpr   = window.devicePixelRatio || 1;
    const scale = (w * dpr) / nativeW;
    const vp    = page.getViewport({ scale });
    targetCanvas.width  = vp.width;
    targetCanvas.height = vp.height;
    targetCanvas.style.width  = w + 'px';
    targetCanvas.style.height = h + 'px';
    await page.render({ canvasContext: targetCanvas.getContext('2d'), viewport: vp }).promise;
  }

  function layoutSpread(i) {
    const pages  = spreadPages(i);
    const double = pages.length === 2;
    const { w, h } = getPageDisplaySize(double);

    spreadEl.classList.toggle('single', !double);
    panelLeft.style.width   = w + 'px';
    panelLeft.style.height  = h + 'px';
    panelRight.style.display = double ? 'block' : 'none';
    if (double) {
      panelRight.style.width  = w + 'px';
      panelRight.style.height = h + 'px';
    }
  }

  async function renderSpread(i, leftCanvas, rightCanvas) {
    const pages = spreadPages(i);
    layoutSpread(i);
    await renderSinglePage(pages[0], leftCanvas);
    if (pages[1]) await renderSinglePage(pages[1], rightCanvas);
  }

  // Off-screen staging canvases for pre-rendering next spread
  const stageLeft  = document.createElement('canvas');
  const stageRight = document.createElement('canvas');

  async function init() {
    loadingEl.classList.add('active');
    try {
      pdfDoc = await pdfjsLib.getDocument(PDF_PATH).promise;
      totalPages = pdfDoc.numPages;

      const p1 = await pdfDoc.getPage(1);
      const vp = p1.getViewport({ scale: 1 });
      nativeW = vp.width;
      nativeH = vp.height;

      spreadIdx = 0;
      await renderSpread(0, canvasLeft, canvasRight);
      loadingEl.classList.remove('active');
      buildDots();
      updateUI();
    } catch (err) {
      loadingEl.classList.remove('active');
      spreadEl.style.display = 'none';
      errorMsg.style.display = 'block';
      errorMsg.innerHTML = 'Could not load machinezine.pdf.<br><small>' + err + '</small>';
    }
  }

  async function turn(direction) {
    if (isAnimating) return;
    const target = spreadIdx + direction;
    if (target < 0 || target >= totalSpreads()) return;

    isAnimating = true;
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    setNavZonesDisabled(true);

    // Pre-render target spread into staging canvases
    await renderSpread(target, stageLeft, stageRight);

    // Snapshot the current visible spread into flip canvas
    // We need to combine both panels into one image for the flip
    const curW = panelLeft.offsetWidth + (panelRight.style.display !== 'none' ? panelRight.offsetWidth : 0);
    const curH = panelLeft.offsetHeight;

    canvasFlip.width  = canvasLeft.width + (panelRight.style.display !== 'none' ? canvasRight.width : 0);
    canvasFlip.height = canvasLeft.height;
    canvasFlip.style.width  = curW + 'px';
    canvasFlip.style.height = curH + 'px';

    const fCtx = canvasFlip.getContext('2d');
    fCtx.drawImage(canvasLeft, 0, 0);
    if (panelRight.style.display !== 'none') {
      fCtx.drawImage(canvasRight, canvasLeft.width, 0);
    }

    flipOverlay.style.display = 'block';

    // Now swap the visible canvases to the next spread
    spreadIdx = target;
    layoutSpread(target);

    // Copy staged renders into the live canvases
    const ctxL = canvasLeft.getContext('2d');
    canvasLeft.width  = stageLeft.width;
    canvasLeft.height = stageLeft.height;
    canvasLeft.style.width  = stageLeft.style.width;
    canvasLeft.style.height = stageLeft.style.height;
    ctxL.drawImage(stageLeft, 0, 0);

    if (panelRight.style.display !== 'none' && stageRight.width > 0) {
      const ctxR = canvasRight.getContext('2d');
      canvasRight.width  = stageRight.width;
      canvasRight.height = stageRight.height;
      canvasRight.style.width  = stageRight.style.width;
      canvasRight.style.height = stageRight.style.height;
      ctxR.drawImage(stageRight, 0, 0);
    }

    panelLeft.style.width   = stageLeft.style.width;
    panelLeft.style.height  = stageLeft.style.height;

    canvasFlip.classList.remove('flipping-forward', 'flipping-backward', 'dragging');
    void canvasFlip.offsetWidth;
    canvasFlip.classList.add(direction > 0 ? 'flipping-forward' : 'flipping-backward');

    updateUI();

    setTimeout(() => {
      flipOverlay.style.display = 'none';
      canvasFlip.classList.remove('flipping-forward', 'flipping-backward');
      isAnimating = false;
      setNavZonesDisabled(false);
      prevBtn.disabled = spreadIdx <= 0;
      nextBtn.disabled = spreadIdx >= totalSpreads() - 1;
    }, 520);
  }

  function setNavZonesDisabled(disabled) {
    navZoneLeft.classList.toggle('disabled', disabled || spreadIdx <= 0);
    navZoneRight.classList.toggle('disabled', disabled || spreadIdx >= totalSpreads() - 1);
  }

  function updateUI() {
    const pages = spreadPages(spreadIdx);
    const last  = pages[pages.length - 1];
    pageInfo.textContent = pages.length === 1
      ? `Page ${pages[0]} of ${totalPages}`
      : `Pages ${pages[0]}\u2013${last} of ${totalPages}`;
    prevBtn.disabled = spreadIdx <= 0 || isAnimating;
    nextBtn.disabled = spreadIdx >= totalSpreads() - 1 || isAnimating;
    setNavZonesDisabled(false);
    updateDots();
  }

  function buildDots() {
    progressDots.innerHTML = '';
    const count = totalSpreads();
    for (let i = 0; i < count; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.addEventListener('click', () => {
        if (isAnimating || i === spreadIdx) return;
        jumpToSpread(i);
      });
      progressDots.appendChild(d);
    }
  }

  function updateDots() {
    progressDots.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === spreadIdx);
      d.classList.toggle('near', Math.abs(i - spreadIdx) <= 2 && i !== spreadIdx);
    });
  }

  async function jumpToSpread(i) {
    if (isAnimating) return;
    isAnimating = true;
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    setNavZonesDisabled(true);
    loadingEl.classList.add('active');
    spreadIdx = i;
    await renderSpread(i, canvasLeft, canvasRight);
    loadingEl.classList.remove('active');
    isAnimating = false;
    updateUI();
  }

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(async () => {
      if (!pdfDoc) return;
      await renderSpread(spreadIdx, canvasLeft, canvasRight);
    }, 150);
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') turn(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   turn(-1);
  });

  // --- Click zones: tap/click the left or right half of the spread to turn pages ---
  navZoneLeft.addEventListener('click', () => turn(-1));
  navZoneRight.addEventListener('click', () => turn(1));

  // --- Touch swipe and mouse-drag gestures ---
  // Works for touch (phone/iPad) via touchstart/move/end, and for mouse
  // via pointerdown/move/up so a trackpad or mouse drag also turns pages.
  let dragActive   = false;
  let dragStartX   = 0;
  let dragStartY   = 0;
  let dragLastX    = 0;
  let dragIsSwipe  = null; // null = undecided, true = horizontal swipe, false = vertical scroll/ignore

  const SWIPE_THRESHOLD   = 40;  // px needed to commit to a page turn
  const SWIPE_LOCK_ANGLE  = 0.6; // ratio of |dx| vs |dy| to decide "this is horizontal"

  function dragStart(x, y) {
    if (isAnimating) return;
    dragActive  = true;
    dragStartX  = x;
    dragStartY  = y;
    dragLastX   = x;
    dragIsSwipe = null;
  }

  function dragMove(x, y, ev) {
    if (!dragActive || isAnimating) return;
    const dx = x - dragStartX;
    const dy = y - dragStartY;

    if (dragIsSwipe === null) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        dragIsSwipe = Math.abs(dx) > Math.abs(dy) * SWIPE_LOCK_ANGLE;
      }
    }

    if (dragIsSwipe && ev && ev.cancelable) ev.preventDefault();
    dragLastX = x;
  }

  function dragEnd() {
    if (!dragActive) return;
    dragActive = false;
    if (!dragIsSwipe) return;

    const dx = dragLastX - dragStartX;
    if (dx <= -SWIPE_THRESHOLD) {
      turn(1);   // swiped left -> next page
    } else if (dx >= SWIPE_THRESHOLD) {
      turn(-1);  // swiped right -> previous page
    }
  }

  stage.addEventListener('touchstart', e => {
    const t = e.touches[0];
    dragStart(t.clientX, t.clientY);
  }, { passive: true });

  stage.addEventListener('touchmove', e => {
    const t = e.touches[0];
    dragMove(t.clientX, t.clientY, e);
  }, { passive: false });

  stage.addEventListener('touchend', () => dragEnd(), { passive: true });
  stage.addEventListener('touchcancel', () => { dragActive = false; }, { passive: true });

  // Mouse drag support (desktop/trackpad users who want to drag instead of clicking)
  let mouseDown = false;
  stage.addEventListener('mousedown', e => {
    mouseDown = true;
    dragStart(e.clientX, e.clientY);
  });
  window.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    dragMove(e.clientX, e.clientY, e);
  });
  window.addEventListener('mouseup', () => {
    if (!mouseDown) return;
    mouseDown = false;
    dragEnd();
  });

  init();
</script>
</body>
</html>
